<!DOCTYPE html>
<html>
<head>
<title>Quantum Core</title>
<style>
body{
  background:black;
  color:#00ffd5;
  font-family:Arial;
  padding:20px;
}
.card{
  border:1px solid #00ffd5;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
h1{color:#00ffd5;}
</style>
</head>

<body>

<h1>⚡ Quantum Core Dashboard</h1>

<div class="card">
  <h2>System</h2>
  <div id="system">Loading...</div>
</div>

<div class="card">
  <h2>Status</h2>
  <div id="status">Loading...</div>
</div>

<div class="card">
  <h2>Entropy</h2>
  <div id="entropy">Loading...</div>
</div>

<div class="card">
  <h2>Glyphs</h2>
  <div id="glyphs">Loading...</div>
</div>

<script>
fetch("data/public_research_summary.json")
.then(r=>r.json())
.then(d=>{
  document.getElementById("system").innerText = d.system;
  document.getElementById("status").innerText = d.status;
  document.getElementById("entropy").innerText = d.entropy;
  document.getElementById("glyphs").innerText = d.glyphs.join(" ");
})
.catch(e=>{
  document.body.innerHTML += "<p>⚠️ Error loading data</p>";
});
</script>

</body>
</html>
